<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Colorful Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>

  <main class="app" aria-label="Colorful calculator">
    <h1 class="visually-hidden">Colorful Calculator</h1>

    <section class="calculator" role="application" aria-label="Calculator">
      <div class="display" id="display" aria-live="polite">0</div>

      <div class="keys">
        <button class="btn func" data-action="clear" aria-label="Clear">AC</button>
        <button class="btn func" data-action="back" aria-label="Backspace">⌫</button>
        <button class="btn func" data-value="%">%</button>
        <button class="btn op" data-value="÷">÷</button>

        <button class="btn" data-value="7">7</button>
        <button class="btn" data-value="8">8</button>
        <button class="btn" data-value="9">9</button>
        <button class="btn op" data-value="×">×</button>

        <button class="btn" data-value="4">4</button>
        <button class="btn" data-value="5">5</button>
        <button class="btn" data-value="6">6</button>
        <button class="btn op" data-value="−">−</button>

        <button class="btn" data-value="1">1</button>
        <button class="btn" data-value="2">2</button>
        <button class="btn" data-value="3">3</button>
        <button class="btn op" data-value="+">+</button>

        <button class="btn zero" data-value="0">0</button>
        <button class="btn" data-value=".">.</button>
        <button class="btn equals" data-action="equals" aria-label="Equals">=</button>
      </div>
    </section>

    <aside class="controls">
      <label>
        Animation intensity
        <select id="intensity">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </label>
    </aside>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
